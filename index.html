<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>თერჯოლის მუნიციპალიტეტი - რეპორტინგი</title>
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <style>
        :root {
            /* ფერები თერჯოლის გერბიდან მოტივირებული */
            --primary-green: #117843; 
            --light-green: #1e9e5d;
            --accent-gold: #d4af37;
            --bg-light: #f4f7f6;
            --text-dark: #2c3e50;
            --card-bg: #ffffff;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-light);
            color: var(--text-dark);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* ჰედერი და ლოგო ანიმაციით */
        header {
            background: linear-gradient(135deg, white 0%, #fcfcfc 100%);
            width: 100%;
            padding: 15px 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            position: sticky;
            top: 0;
            z-index: 1000;
            border-bottom: 3px solid var(--primary-green);
        }

        .logo-img {
            width: 65px;
            height: auto;
            filter: drop-shadow(0px 4px 6px rgba(0,0,0,0.1));
            transition: transform 0.3s ease;
        }

        .logo-img:hover {
            transform: scale(1.05) rotate(-2deg);
        }

        header h1 {
            font-size: 1.6rem;
            color: var(--primary-green);
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 800;
        }

        /* მთავარი ფორმის კონტეინერი */
        .container {
            max-width: 550px;
            width: 90%;
            margin: 40px auto;
            background: var(--card-bg);
            padding: 40px 30px;
            border-radius: 16px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.05);
            position: relative;
            overflow: hidden;
        }

        /* დეკორატიული ხაზი კონტეინერის თავზე */
        .container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 5px;
            background: linear-gradient(90deg, var(--primary-green), var(--accent-gold));
        }

        h2 {
            text-align: center;
            color: var(--text-dark);
            margin-bottom: 25px;
            font-size: 1.4rem;
        }

        .form-group {
            margin-bottom: 22px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #555;
            font-size: 0.95rem;
        }

        /* ველების დიზაინი (Focus ეფექტებით) */
        input[type="text"], select, textarea, input[type="file"] {
            width: 100%;
            padding: 14px;
            border: 2px solid #e0e6ed;
            border-radius: 10px;
            font-size: 1rem;
            background-color: #f8fafb;
            transition: all 0.3s ease;
        }

        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: var(--primary-green);
            background-color: #fff;
            box-shadow: 0 0 0 4px rgba(17, 120, 67, 0.1);
        }

        textarea {
            resize: vertical;
            min-height: 100px;
        }

        /* ფოტოს პრევვიუ */
        #imagePreviewContainer {
            margin-top: 15px;
            display: none;
            text-align: center;
            position: relative;
        }
        
        #imagePreview {
            max-width: 100%;
            max-height: 250px;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.15);
            border: 3px solid white;
        }

        /* მთავარი ღილაკი ანიმაციებით */
        button {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, var(--primary-green) 0%, var(--light-green) 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1.1rem;
            font-weight: bold;
            letter-spacing: 0.5px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 8px 20px rgba(17, 120, 67, 0.25);
            position: relative;
            overflow: hidden;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(17, 120, 67, 0.35);
        }
        
        button:active {
            transform: translateY(1px);
        }

        /* შეტყობინების ველი */
        #message {
            margin-top: 20px;
            text-align: center;
            font-weight: bold;
            padding: 15px;
            border-radius: 10px;
            display: none;
            animation: fadeIn 0.5s;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* ჩატვირთვის (Loading) ანიმაცია */
        .spinner {
            display: none;
            width: 24px;
            height: 24px;
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s ease-in-out infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        /* მობილურისთვის */
        @media (max-width: 480px) {
            header h1 { font-size: 1.2rem; }
            .logo-img { width: 50px; }
            .container { padding: 30px 20px; margin: 20px auto; }
        }

    </style>
</head>
<body>

<header data-aos="fade-down" data-aos-duration="800">
    <img src="https://upload.wikimedia.org/wikipedia/commons/6/67/Terjola_coa.png" alt="თერჯოლის გერბი" class="logo-img">
    <h1>თერჯოლის მუნიციპალიტეტი</h1>
</header>

<div class="container" data-aos="zoom-in-up" data-aos-duration="1000">
    <h2 data-aos="fade-up" data-aos-delay="200">ინფრასტრუქტურული პრობლემის დაფიქსირება</h2>
    
    <form id="issueForm">
        <div class="form-group" data-aos="fade-up" data-aos-delay="300">
            <label for="category">პრობლემის ტიპი</label>
            <select id="category" required>
                <option value="" disabled selected>აირჩიეთ კატეგორია...</option>
                <option value="გზები და ტროტუარები">გზები და ტროტუარები</option>
                <option value="გარე განათება">გარე განათება</option>
                <option value="დასუფთავება/ნაგავსაყრელი">დასუფთავება / ნაგავსაყრელი</option>
                <option value="წყალმომარაგება/კანალიზაცია">წყალმომარაგება / კანალიზაცია</option>
                <option value="გამწვანება/პარკები">გამწვანება / პარკები</option>
                <option value="სხვა">სხვა</option>
            </select>
        </div>

        <div class="form-group" data-aos="fade-up" data-aos-delay="400">
            <label for="address">ზუსტი მისამართი ან ლოკაცია</label>
            <input type="text" id="address" placeholder="მაგ: რუსთაველის ქ. 15 ან სოფ. ჩხარი" required>
        </div>

        <div class="form-group" data-aos="fade-up" data-aos-delay="500">
            <label for="description">აღწერა</label>
            <textarea id="description" placeholder="გთხოვთ, მოკლედ აღწეროთ არსებული ვითარება..." required></textarea>
        </div>

        <div class="form-group" data-aos="fade-up" data-aos-delay="600">
            <label for="image">ატვირთეთ ფოტო (სასურველია)</label>
            <input type="file" id="image" accept="image/*">
            <div id="imagePreviewContainer">
                <img src="" alt="ატვირთული ფოტო" id="imagePreview">
            </div>
        </div>

        <div data-aos="fade-up" data-aos-delay="700">
            <button type="submit" id="submitBtn">
                <span id="btnText">განაცხადის გაგზავნა</span>
                <div class="spinner" id="btnSpinner"></div>
            </button>
        </div>
    </form>
    
    <div id="message"></div>
</div>

<script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
<script>
    // ანიმაციების ინიციალიზაცია
    AOS.init({ once: true });

    // შენი Google Apps Script-ის URL
    const GOOGLE_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwr4CjqFTuFFyRrWOk_8GkmiITR---lfEP2_l0-4HoRj6BTRQ3EUZnLljO4bOsUGIuykQ/exec'; 

    const fileInput = document.getElementById('image');
    const previewContainer = document.getElementById('imagePreviewContainer');
    const previewImage = document.getElementById('imagePreview');
    let base64Image = "";
    let imageName = "";

    // ფოტოს დაპატარავების ლოგიკა (Canvas მეთოდი)
    fileInput.addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (file) {
            imageName = file.name;
            const reader = new FileReader();
            
            reader.onload = function(event) {
                const img = new Image();
                img.onload = function() {
                    const canvas = document.createElement('canvas');
                    const MAX_WIDTH = 800; // ფოტოს მაქსიმალური სიგანე
                    const MAX_HEIGHT = 800; // ფოტოს მაქსიმალური სიმაღლე
                    let width = img.width;
                    let height = img.height;

                    if (width > height) {
                        if (width > MAX_WIDTH) {
                            height *= MAX_WIDTH / width;
                            width = MAX_WIDTH;
                        }
                    } else {
                        if (height > MAX_HEIGHT) {
                            width *= MAX_HEIGHT / height;
                            height = MAX_HEIGHT;
                        }
                    }

                    canvas.width = width;
                    canvas.height = height;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, width, height);

                    // ფოტოს დაკომპრესირება (quality: 0.7)
                    base64Image = canvas.toDataURL('image/jpeg', 0.7);
                    
                    previewImage.src = base64Image;
                    previewContainer.style.display = 'block';
                    previewContainer.classList.add('aos-animate'); // ანიმაციის ტრიგერი
                };
                img.src = event.target.result;
            }
            reader.readAsDataURL(file);
        } else {
            previewContainer.style.display = 'none';
            base64Image = "";
            imageName = "";
        }
    });

    // ფორმის გაგზავნა
    document.getElementById('issueForm').addEventListener('submit', function(e) {
        e.preventDefault();
        
        const submitBtn = document.getElementById('submitBtn');
        const btnText = document.getElementById('btnText');
        const btnSpinner = document.getElementById('btnSpinner');
        const messageDiv = document.getElementById('message');

        // Loading ვიზუალი
        submitBtn.disabled = true;
        btnText.style.display = 'none';
        btnSpinner.style.display = 'block';
        messageDiv.style.display = 'none';

        const formData = {
            category: document.getElementById('category').value,
            address: document.getElementById('address').value,
            description: document.getElementById('description').value,
            image: base64Image,
            imageName: imageName
        };

        fetch(GOOGLE_SCRIPT_URL, {
            method: 'POST',
            body: JSON.stringify(formData) // cors რეჟიმის გარეშე მეტი სტაბილურობისთვის
        })
        .then(() => {
            messageDiv.style.color = '#0f5132';
            messageDiv.style.backgroundColor = '#d1e7dd';
            messageDiv.style.border = '1px solid #badbcc';
            messageDiv.innerText = 'თქვენი განაცხადი წარმატებით გაიგზავნა! მადლობა ჩართულობისთვის.';
            messageDiv.style.display = 'block';
            
            // ფორმის გასუფთავება
            document.getElementById('issueForm').reset();
            previewContainer.style.display = 'none';
            base64Image = "";
            imageName = "";
        })
        .catch(error => {
            console.error('Error:', error);
            messageDiv.style.color = '#842029';
            messageDiv.style.backgroundColor = '#f8d7da';
            messageDiv.style.border = '1px solid #f5c2c7';
            messageDiv.innerText = 'სისტემური შეცდომა. გთხოვთ, სცადოთ მოგვიანებით.';
            messageDiv.style.display = 'block';
        })
        .finally(() => {
            submitBtn.disabled = false;
            btnText.style.display = 'block';
            btnSpinner.style.display = 'none';
        });
    });
</script>

</body>
</html>
