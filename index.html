<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ჩემი მუნიციპალიტეტი - რეპორტინგი</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; padding: 20px; }
        .container { max-width: 500px; margin: 0 auto; background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #333; }
        label { display: block; margin-top: 15px; font-weight: bold; }
        input, select, textarea { width: 100%; padding: 10px; margin-top: 5px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        button { margin-top: 20px; width: 100%; padding: 12px; background-color: #28a745; color: white; border: none; border-radius: 4px; font-size: 16px; cursor: pointer; }
        button:hover { background-color: #218838; }
        #message { margin-top: 15px; text-align: center; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h2>პრობლემის დაფიქსირება</h2>
    <form id="issueForm">
        <label for="category">პრობლემის ტიპი:</label>
        <select id="category" required>
            <option value="">აირჩიეთ კატეგორია...</option>
            <option value="ინფრასტრუქტურა (გზა, ხიდი)">ინფრასტრუქტურა (გზა, ხიდი)</option>
            <option value="გარე განათება">გარე განათება</option>
            <option value="დასუფთავება/ნაგავი">დასუფთავება/ნაგავი</option>
            <option value="სხვა">სხვა</option>
        </select>

        <label for="address">ზუსტი მისამართი/სოფელი:</label>
        <input type="text" id="address" placeholder="მაგ: რუსთაველის ქუჩა, N5" required>

        <label for="description">აღწერა:</label>
        <textarea id="description" rows="4" placeholder="მოკლედ აღწერეთ პრობლემა..." required></textarea>

        <button type="submit">გაგზავნა</button>
    </form>
    <div id="message"></div>
</div>

<script>
    // აქ ჩასვი შენი Apps Script-ის Web App URL
    const GOOGLE_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwuYzu2zvrt1y7VTztctmAgbFF0gFUpeZ-PED585uPRFM1uvW9b_M4vLOVHFCYGgg-oxQ/exec'; 

    document.getElementById('issueForm').addEventListener('submit', function(e) {
        e.preventDefault(); // ვაჩერებთ გვერდის გადატვირთვას
        
        const messageDiv = document.getElementById('message');
        messageDiv.style.color = 'blue';
        messageDiv.innerText = 'იგზავნება...';

        const formData = {
            category: document.getElementById('category').value,
            address: document.getElementById('address').value,
            description: document.getElementById('description').value
        };

        fetch(GOOGLE_SCRIPT_URL, {
            method: 'POST',
            mode: 'no-cors', // მნიშვნელოვანია CORS შეცდომის თავიდან ასაცილებლად
            headers: {
                'Content-Type': 'application/json',
            },
            body: JSON.stringify(formData)
        })
        .then(() => {
            messageDiv.style.color = 'green';
            messageDiv.innerText = 'პრობლემა წარმატებით გაიგზავნა მუნიციპალიტეტის ბაზაში!';
            document.getElementById('issueForm').reset();
        })
        .catch(error => {
            console.error('Error:', error);
            messageDiv.style.color = 'red';
            messageDiv.innerText = 'დაფიქსირდა შეცდომა. სცადეთ თავიდან.';
        });
    });
</script>

</body>
</html>
